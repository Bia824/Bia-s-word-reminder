<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Reminder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Priority Planner</p>
        <h1>Work Reminder</h1>
        <p class="subtitle">把注意力留给真正重要的事情。</p>
      </div>

      <div class="mode-switch" aria-label="任务显示模式">
        <button id="allBtn" onclick="setMode('all')">全部任务</button>
        <button id="focusBtn" onclick="setMode('focus')">专注模式</button>
      </div>
    </header>

    <section class="stats" aria-label="任务统计">
      <div class="stat-card">
        <span>今日完成</span>
        <strong id="todayDoneCount">0</strong>
      </div>
      <div class="stat-card">
        <span>未完成任务</span>
        <strong id="pendingCount">0</strong>
      </div>
      <div class="stat-card">
        <span>优先任务</span>
        <strong id="urgentCount">0</strong>
      </div>
      <div class="stat-card">
        <span>已过期</span>
        <strong id="overdueCount">0</strong>
      </div>
    </section>

    <section class="input-area" aria-label="新增任务">
      <div class="input-copy">
        <span>New Task</span>
        <strong>添加一件要完成的事</strong>
      </div>
      <input id="taskInput" placeholder="输入任务内容...">
      <input id="noteInput" placeholder="添加备注（可选）...">
      <input id="deadlineInput" type="date" aria-label="截止日期">
      <button class="add-button" onclick="addTask()">添加任务</button>
    </section>

    <section class="boards">
      <div class="board urgent">
        <div class="board-heading">
          <div>
            <span class="board-label">Priority</span>
            <h2>优先要完成的任务</h2>
          </div>
          <span class="status-dot"></span>
        </div>
        <ul id="urgentList"></ul>
      </div>

      <div class="board normal">
        <div class="board-heading">
          <div>
            <span class="board-label">Later</span>
            <h2>不紧急的任务</h2>
          </div>
          <span class="status-dot"></span>
        </div>
        <ul id="normalList"></ul>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
