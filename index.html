<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Reminder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="updateProgress" class="update-progress" hidden>
    <div class="update-progress-copy">
      <strong id="updateProgressTitle">更新下载中</strong>
      <span id="updateProgressDetail">0%</span>
    </div>
    <div class="update-progress-track" aria-hidden="true">
      <div id="updateProgressBar" class="update-progress-bar"></div>
    </div>
  </div>

  <main class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Priority Planner</p>
        <h1>Work Reminder</h1>
        <p class="subtitle">把注意力留给真正重要的事情。</p>
      </div>
    </header>

    <section class="view-filters" aria-label="任务视图筛选">
      <button class="filter-card active" data-filter="all" onclick="setFilter('all')">
        <span>全部</span>
        <strong id="allCount">0</strong>
      </button>
      <button class="filter-card" data-filter="pending" onclick="setFilter('pending')">
        <span>未完成</span>
        <strong id="pendingCount">0</strong>
      </button>
      <button class="filter-card" data-filter="overdue" onclick="setFilter('overdue')">
        <span>已过期</span>
        <strong id="overdueCount">0</strong>
      </button>
      <button class="filter-card" data-filter="abandoned" onclick="setFilter('abandoned')">
        <span>已放弃</span>
        <strong id="abandonedCount">0</strong>
      </button>
      <button class="filter-card focus-card" data-filter="focus" onclick="setFilter('focus')">
        <span>专注模式</span>
        <strong id="focusCount">0</strong>
      </button>
    </section>

    <div class="active-filter">
      当前视图：<strong id="activeFilterLabel">全部任务</strong>
    </div>

    <section class="input-area" aria-label="新增任务">
      <div class="input-copy">
        <span>New Task</span>
      </div>
      <input id="taskInput" placeholder="输入任务内容...">
      <input id="noteInput" placeholder="添加备注（可选）...">
      <div id="deadlinePicker" class="deadline-picker">
        <input id="deadlineInput" type="hidden">
        <button id="deadlinePickerToggle" class="deadline-picker-toggle" type="button" onclick="toggleDeadlinePicker()">年/月/日 --:--</button>
        <div id="deadlinePickerPanel" class="deadline-picker-panel" hidden></div>
      </div>
      <button class="add-button" onclick="addTask()">添加任务</button>
    </section>

    <section id="boards" class="boards">
      <div class="board task-board">
        <div class="board-heading">
          <div>
            <h2>TO-DO LIST</h2>
          </div>
          <span class="status-dot"></span>
        </div>
        <p class="board-description">越靠上越紧急，已完成任务自动下放。</p>
        <ul id="taskList"></ul>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
